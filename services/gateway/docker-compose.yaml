services:
  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
    env_file:
      - .env
    environment:
      - APP_ENV=development
      # Override route addresses here with Docker-internal service names via environment variables.
      - ROUTES_USER_PLATFORM=http://user-platform:8081
      - ROUTES_USER_PLATFORM_GRPC=user-platform:9091
      - ROUTES_GO_NOTE=http://go-note:8080
      - ROUTES_GO_NOTE_GRPC=go-note:9093
      # If rate limiting is enabled, also override the Redis address with the public or infra-network service name.
      - REDIS_ADDR=${REDIS_ADDR:-global-redis:6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      - OTEL_JAEGER_ENDPOINT=global-jaeger:4318
    networks:
      - go-net
    restart: unless-stopped

networks:
  go-net:
    name: go-net
    external: true
